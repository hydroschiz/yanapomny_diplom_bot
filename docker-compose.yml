services:
  mongodb1:
    image: mongo:4.4.6
    container_name: mongodb1
    restart: unless-stopped
    volumes:
      - ./data/db_data:/data/db
      - ./data/log:/data/log
      - ./data/mongod.conf:/etc/mongod.conf
    ports:
      - "27018:27017"
    entrypoint: ["/bin/sh", "-c", "exec mongod --config /etc/mongod.conf"]

  redis:
    image: redis:7-alpine
    container_name: yanapomnyu-redis
    restart: unless-stopped
    volumes:
      - ./data/redis_data:/data
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes

  # Ollama runs locally on host, not in Docker
  # Start with: ollama serve
  # Model: gemma3-12b:latest

  llm_api:
    build:
      context: ../../../GoProjects/llm_api
      dockerfile: Dockerfile
    container_name: yanapomnyu-llm-api
    restart: unless-stopped
    network_mode: host
    environment:
      - HOST=0.0.0.0
      - PORT=8080
      - OPENAI_BASE_URL=https://openrouter.ai/api/v1/
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=google/gemma-3-27b-it:free

  bot:
    image: rustlang/rust:nightly
    container_name: yanapomnyu-bot
    restart: unless-stopped
    depends_on:
      - mongodb1
      - redis
      - llm_api
    working_dir: /app
    volumes:
      - ./:/app
    env_file:
      - .env
    environment:
      - MONGO_URI=${MONGO_URI:-mongodb://tgBotUser:tgBotPassword@mongodb1:27017/tgBot?authSource=tgBot}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/}
      - LLM_API_URL=http://llm_api:8080
    command: bash -lc "source /usr/local/cargo/env && cargo +nightly build --release && ./target/release/yanapomnyu_bot"
    ports:
      - "3001:3001"
